<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="bg-white p-8 rounded-lg shadow-md w-96">
    <h1 class="text-2xl font-bold mb-6 text-center">Login</h1>
    <form id="loginForm">
      <input id="email" type="email" placeholder="Email" class="w-full p-3 mb-4 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
      <input id="senha" type="password" placeholder="Senha" class="w-full p-3 mb-4 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
      <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 font-semibold">Entrar</button>
    </form>
    <a href="#" id="esqueci" class="block text-center mt-4 text-blue-600 hover:underline">Esqueci minha senha</a>
    <p id="msg" class="mt-4 text-center text-sm"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
